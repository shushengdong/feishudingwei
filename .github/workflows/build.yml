name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Download Xposed API
        run: |
          mkdir -p app/libs
          curl -L -o app/libs/api-82.jar https://maven.aliyun.com/repository/public/de/robv/android/xposed/api/82/api-82.jar
          ls -la app/libs/

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LocationResearch-APK
          path: app/build/outputs/apk/debug/*.apk
