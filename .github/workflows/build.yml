name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build APK
        id: build
        run: |
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug 2>&1 | tee /tmp/build.log
          EXIT=${PIPESTATUS[0]}
          # Extract all error/warning/failure lines
          grep -iE "error|fail|unresolved|cannot find symbol|expect" /tmp/build.log | head -30 | while IFS= read -r line; do
            echo "::error::${line}"
          done
          exit $EXIT

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: LocationResearch-APK
          path: app/build/outputs/apk/debug/*.apk
