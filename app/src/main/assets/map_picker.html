<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Pick Location</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:sans-serif}
#map{width:100%;height:100%}
.crosshair{position:fixed;top:50%;left:50%;width:44px;height:44px;transform:translate(-50%,-50%);pointer-events:none;z-index:1000}
.crosshair::before,.crosshair::after{content:'';position:absolute;background:rgba(229,57,53,0.9)}
.crosshair::before{width:2px;height:44px;left:21px;top:0}
.crosshair::after{width:44px;height:2px;left:0;top:21px}
.crosshair-dot{position:absolute;top:17px;left:17px;width:10px;height:10px;border:2px solid rgba(229,57,53,0.8);border-radius:50%}
.bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.95);padding:12px 16px;box-shadow:0 -2px 12px rgba(0,0,0,.2);z-index:999}
.coords{font-size:13px;color:#333;margin-bottom:6px;text-align:center;line-height:1.4}
.address{font-size:11px;color:#888;margin-bottom:8px;text-align:center;line-height:1.3;min-height:16px}
.btns{display:flex;gap:8px}
.btn{flex:1;padding:12px;border:none;border-radius:8px;font-size:15px;cursor:pointer;font-weight:500}
.btn-ok{background:#4CAF50;color:#fff}
.btn-no{background:#eee;color:#333}
.search-box{position:fixed;top:12px;left:12px;right:12px;z-index:999;display:flex;gap:6px}
.search-input{flex:1;padding:10px 14px;border:none;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.25);font-size:14px;outline:none;background:rgba(255,255,255,0.95)}
.search-btn{padding:10px 14px;border:none;border-radius:10px;background:#4CAF50;color:#fff;font-size:14px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.25);white-space:nowrap}
.searching{background:#999!important}
.result-list{position:fixed;top:56px;left:12px;right:12px;z-index:998;background:rgba(255,255,255,0.98);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.2);max-height:40vh;overflow-y:auto;display:none}
.result-item{padding:12px 14px;border-bottom:1px solid #eee;cursor:pointer;font-size:13px;color:#333}
.result-item:hover,.result-item:active{background:#E8F5E9}
.result-item .name{font-weight:500}
.result-item .detail{font-size:11px;color:#999;margin-top:2px}
</style>
</head>
<body>
<div class="search-box">
<input class="search-input" id="search" placeholder="Search address..." autocomplete="off">
<button class="search-btn" id="searchBtn" onclick="searchPlace()">Search</button>
</div>
<div class="result-list" id="resultList"></div>
<div class="crosshair"><div class="crosshair-dot"></div></div>
<div id="map"></div>
<div class="bar">
<div class="coords" id="coords">Drag map, crosshair on target</div>
<div class="address" id="address"></div>
<div class="btns">
<button class="btn btn-no" onclick="doCancel()">Cancel</button>
<button class="btn btn-ok" onclick="doConfirm()">Confirm</button>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var map = L.map('map', { zoomControl: false }).setView([INIT_LAT, INIT_LNG], 15);

// Gaode tiles (fast in China)
var gaodeLayer = L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
  subdomains: '1234', maxZoom: 18
}).addTo(map);

var osmLayer = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 });
L.control.zoom({ position: 'bottomright' }).addTo(map);

var currentAddress = '';
var geocodeTimer = null;

function updateInfo() {
  var c = map.getCenter();
  document.getElementById('coords').textContent = c.lat.toFixed(6) + ', ' + c.lng.toFixed(6);
  if (geocodeTimer) clearTimeout(geocodeTimer);
  geocodeTimer = setTimeout(function() { reverseGeocode(c.lat, c.lng); }, 500);
}

// Use Nominatim for reverse geocode (same origin as baseURL)
function reverseGeocode(lat, lng) {
  var addrEl = document.getElementById('address');
  addrEl.textContent = 'Looking up...';
  fetch('reverse?format=json&lat=' + lat + '&lon=' + lng + '&zoom=18&accept-language=zh')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d && d.display_name) {
        currentAddress = d.display_name;
        addrEl.textContent = d.display_name;
      } else { addrEl.textContent = ''; currentAddress = ''; }
    })
    .catch(function() { addrEl.textContent = ''; currentAddress = ''; });
}

map.on('move', updateInfo);
map.on('moveend', updateInfo);
updateInfo();

document.getElementById('search').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') searchPlace();
});

// Search: Only use Nominatim (same-origin, no CORS issue)
function searchPlace() {
  var q = document.getElementById('search').value.trim();
  if (!q) return;

  var btn = document.getElementById('searchBtn');
  var origText = btn.textContent;
  btn.textContent = 'Searching...';
  btn.className = 'search-btn searching';
  document.getElementById('coords').textContent = 'Search: ' + q;

  // Use relative URL (same-origin with baseURL = nominatim.openstreetmap.org)
  var url = 'search?format=json&q=' + encodeURIComponent(q) + '&limit=5&accept-language=zh';

  fetch(url, { headers: { 'User-Agent': 'LocationPicker/2.0' } })
    .then(function(r) { return r.json(); })
    .then(function(results) {
      btn.textContent = origText;
      btn.className = 'search-btn';
      if (results && results.length > 0) {
        if (results.length === 1) {
          var r = results[0];
          map.setView([parseFloat(r.lat), parseFloat(r.lon)], 17);
          updateInfo();
          var marker = L.marker([parseFloat(r.lat), parseFloat(r.lon)]).addTo(map);
          setTimeout(function() { map.removeLayer(marker); }, 3000);
        } else {
          showResultList(results);
        }
        document.getElementById('resultList').style.display = 'none';
      } else {
        document.getElementById('coords').textContent = 'Not found: ' + q;
        updateInfo();
      }
    })
    .catch(function(err) {
      btn.textContent = origText;
      btn.className = 'search-btn';
      document.getElementById('coords').textContent = 'Search failed. Check network.';
      updateInfo();
    });
}

function showResultList(results) {
  var list = document.getElementById('resultList');
  var html = '';
  results.forEach(function(r, i) {
    var name = r.display_name ? r.display_name.split(',')[0] : ('Result ' + (i+1));
    var detail = r.display_name ? r.display_name.split(',').slice(1,4).join(',') : '';
    html += '<div class="result-item" onclick="selectResult(' + i + ')">'
      + '<div class="name">' + name + '</div>'
      + (detail ? '<div class="detail">' + detail.trim() + '</div>' : '')
      + '</div>';
  });
  list.innerHTML = html;
  list.style.display = 'block';
  window._searchResults = results;
}

function selectResult(i) {
  var r = window._searchResults[i];
  if (r.lat !== undefined && r.lon !== undefined) {
    map.setView([parseFloat(r.lat), parseFloat(r.lon)], 17);
  }
  updateInfo();
  document.getElementById('resultList').style.display = 'none';
  var marker = L.marker([parseFloat(r.lat), parseFloat(r.lon)]).addTo(map);
  setTimeout(function() { map.removeLayer(marker); }, 3000);
}

map.on('click', function() { document.getElementById('resultList').style.display = 'none'; });

// Double-tap to switch tile source
var lastTap = 0;
map.on('dblclick', function() {
  if (map.hasLayer(osmLayer)) { map.removeLayer(osmLayer); if (!map.hasLayer(gaodeLayer)) gaodeLayer.addTo(map); }
  else { gaodeLayer.remove(); osmLayer.addTo(map); }
});

function doConfirm() {
  var c = map.getCenter();
  try { if (window.Android) window.Android.onLocationSelected(c.lat, c.lng); } catch(e) {}
}

function doCancel() {
  try { if (window.Android) window.Android.onCancel(); } catch(e) {}
}
</script>
</body>
</html>
